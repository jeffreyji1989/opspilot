server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/opspilot?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: always
    properties:
      org:
        quartz:
          scheduler:
            instanceName: OpsPilotScheduler
            instanceId: AUTO
          jobStore:
            class: org.springframework.scheduling.quartz.LocalDataSourceJobStore
            driverDelegateClass: org.quartz.impl.jdbcjobstore.StdJDBCDelegate
            tablePrefix: QRTZ_
            isClustered: false
            misfireThreshold: 60000
          threadPool:
            class: org.quartz.simpl.SimpleThreadPool
            threadCount: 10
            threadPriority: 5

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.opspilot.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

opspilot:
  jwt:
    # ⚠️ 安全提示(SEC-001)：JWT 密钥必须通过环境变量 OPSPILOT_JWT_SECRET 注入，禁止使用默认值！
    # 启动时会校验密钥是否为默认值，如果是默认值将拒绝启动。
    # 生成方式: export OPSPILOT_JWT_SECRET=$(openssl rand -base64 64)
    secret: ${OPSPILOT_JWT_SECRET:OpsPilotSecretKey2024ChangeMeInProduction}
    expiration: 86400000 # 24h
  aes:
    # ⚠️ 安全提示(SEC-001)：AES 密钥必须通过环境变量 OPSPILOT_AES_KEY 注入，禁止使用默认值！
    # 启动时会校验密钥是否为默认值，如果是默认值将拒绝启动。
    # 用于加密 Git 凭证等敏感数据，建议不少于 32 字节。
    # 生成方式: export OPSPILOT_AES_KEY=$(openssl rand -base64 32)
    key: ${OPSPILOT_AES_KEY:DefaultAesKey16Ch}
  ssh:
    private-key-path: ${user.home}/.opspilot/ssh/id_rsa
  deploy:
    build-timeout: 300
    health-check-timeout: 60
    health-check-path: /actuator/health
  dingtalk:
    webhook: ${OPSPILOT_DINGTALK_WEBHOOK:}
    secret: ${OPSPILOT_DINGTALK_SECRET:}

logging:
  level:
    com.opspilot: DEBUG
    org.springframework.web: INFO
