<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpsPilot - 定时部署任务</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css">
  <script src="https://cdn.jsdelivr.net/npm/vue@3.5/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus"></script>
  <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue"></script>
  <style>
    :root{--brand-50:#EEF2FF;--brand-500:#6366F1;--brand-600:#4F46E5;--success-50:#ECFDF5;--success-500:#10B981;--warning-50:#FFFBEB;--warning-500:#F59E0B;--error-50:#FEF2F2;--error-500:#EF4444;--info-50:#EFF6FF;--info-500:#3B82F6;--neutral-50:#F9FAFB;--neutral-100:#F3F4F6;--neutral-200:#E5E7EB;--neutral-300:#D1D5DB;--neutral-400:#9CA3AF;--neutral-500:#6B7280;--neutral-600:#4B5563;--neutral-700:#374151;--neutral-800:#1F2937;--neutral-900:#111827;--sidebar-bg:#1E1E2D;--sidebar-hover:#2A2A3C;--sidebar-active:#6366F1;--sidebar-text:#A2A3B7;--sidebar-text-active:#FFFFFF;--radius-sm:4px;--radius-md:8px;--shadow-sm:0 1px 2px rgba(0,0,0,0.05)}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Inter,'Helvetica Neue',Arial,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--neutral-50);color:var(--neutral-700);font-size:14px}
    .layout{display:flex;min-height:100vh}
    .sidebar{width:240px;background:var(--sidebar-bg);color:var(--sidebar-text);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow:hidden}
    .sidebar.collapsed{width:64px}
    .sidebar-logo{height:56px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid rgba(255,255,255,.08)}
    .sidebar-logo .logo-icon{font-size:24px;margin-right:12px}.sidebar-logo .logo-text{font-size:18px;font-weight:700;color:#fff;white-space:nowrap}
    .sidebar-menu{flex:1;padding:12px 8px;overflow-y:auto}
    .menu-item{display:flex;align-items:center;padding:10px 16px;border-radius:8px;margin-bottom:4px;cursor:pointer;transition:all .15s;color:var(--sidebar-text);text-decoration:none}
    .menu-item:hover{background:var(--sidebar-hover);color:var(--sidebar-text-active)}
    .menu-item.active{background:var(--sidebar-active);color:#fff;font-weight:500}
    .menu-item .icon{width:20px;margin-right:12px;font-size:16px;flex-shrink:0;text-align:center}
    .sidebar.collapsed .label,.sidebar.collapsed .logo-text{display:none}
    .sidebar.collapsed .menu-item{justify-content:center;padding:10px}.sidebar.collapsed .menu-item .icon{margin-right:0}
    .main-content{flex:1;margin-left:240px;display:flex;flex-direction:column;transition:margin-left .3s}
    .sidebar.collapsed~.main-content{margin-left:64px}
    .topbar{height:56px;background:#fff;border-bottom:1px solid var(--neutral-200);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
    .topbar-left{display:flex;align-items:center;gap:16px}
    .collapse-btn{cursor:pointer;font-size:20px;color:var(--neutral-500)}
    .breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--neutral-500)}
    .breadcrumb .current{color:var(--neutral-800);font-weight:500}
    .avatar{width:32px;height:32px;border-radius:50%;background:var(--brand-500);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;cursor:pointer}
    .page-content{flex:1;padding:24px;max-width:1400px;width:100%}
    .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .page-header h1{font-size:20px;font-weight:600;color:var(--neutral-900)}
    .page-header p{font-size:13px;color:var(--neutral-500);margin-top:4px}
    .card{background:#fff;border-radius:8px;border:1px solid var(--neutral-200);box-shadow:var(--shadow-sm)}
    .card-header{padding:16px 24px;border-bottom:1px solid var(--neutral-200);display:flex;justify-content:space-between;align-items:center}
    .card-header h3{font-size:16px;font-weight:600;color:var(--neutral-800)}
    .card-body{padding:24px}
    .pagination-wrapper{display:flex;justify-content:flex-end;padding:16px 24px;border-top:1px solid var(--neutral-200)}
    .empty-state{text-align:center;padding:60px 20px}
    .empty-state .empty-icon{font-size:64px;margin-bottom:16px}
    .empty-state h4{font-size:16px;color:var(--neutral-700);margin-bottom:8px}
    .empty-state p{font-size:13px;color:var(--neutral-500);margin-bottom:24px}
    .cron-hint{background:var(--info-50);border:1px solid var(--info-500);border-radius:8px;padding:12px 16px;font-size:13px;color:#1E40AF;margin-bottom:16px}
    .cron-hint code{background:rgba(0,0,0,0.06);padding:2px 6px;border-radius:4px;font-size:12px}
    .next-exec{font-size:12px;color:var(--neutral-500);margin-top:4px}
    @media(max-width:1440px){.page-content{max-width:1200px}}
    @media(max-width:768px){.sidebar{width:64px}.sidebar .label,.sidebar .logo-text{display:none}.sidebar .menu-item{justify-content:center;padding:10px}.sidebar .menu-item .icon{margin-right:0}.main-content{margin-left:64px!important}.page-content{padding:16px}.page-header{flex-direction:column;gap:12px;align-items:flex-start}}
  </style>
</head>
<body>
  <div id="app">
    <div class="layout">
      <aside class="sidebar" :class="{collapsed:sidebarCollapsed}">
        <div class="sidebar-logo"><span class="logo-icon">🚀</span><span class="logo-text">OpsPilot</span></div>
        <nav class="sidebar-menu">
          <a class="menu-item" href="dashboard.html"><span class="icon">🏠</span><span class="label">仪表盘</span></a>
          <a class="menu-item" href="project-manage.html"><span class="icon">📁</span><span class="label">项目管理</span></a>
          <a class="menu-item" href="server-manage.html"><span class="icon">🖥️</span><span class="label">服务器管理</span></a>
          <a class="menu-item" href="git-credential.html"><span class="icon">🔑</span><span class="label">Git 认证</span></a>
          <a class="menu-item" href="service-instance.html"><span class="icon">🔧</span><span class="label">服务管理</span></a>
          <a class="menu-item" href="operation-log.html"><span class="icon">📜</span><span class="label">操作日志</span></a>
          <a class="menu-item active" href="#"><span class="icon">⏰</span><span class="label">定时任务</span></a>
          <a class="menu-item" href="#"><span class="icon">⚙️</span><span class="label">系统设置</span></a>
        </nav>
      </aside>
      <div class="main-content">
        <header class="topbar">
          <div class="topbar-left">
            <span class="collapse-btn" @click="sidebarCollapsed=!sidebarCollapsed">{{sidebarCollapsed?'☰':'✕'}}</span>
            <div class="breadcrumb"><span>首页</span><span>/</span><span class="current">定时部署任务</span></div>
          </div>
          <div class="topbar-right"><el-badge :value="3" :max="99"><span style="cursor:pointer;font-size:18px;color:var(--neutral-500)">🔔</span></el-badge><div class="avatar">管</div></div>
        </header>
        <main class="page-content" v-loading="loading">
          <template v-if="!error && !emptyData">
            <div class="page-header">
              <div><h1>定时部署任务</h1><p>设置定时发版任务，支持单次执行和 Cron 表达式。可配置失败回退策略和钉钉通知。</p></div>
              <el-button type="primary" @click="showAddDialog">➕ 创建定时任务</el-button>
            </div>

            <div class="card">
              <el-table :data="taskData" stripe border style="width:100%">
                <el-table-column prop="name" label="任务名称" min-width="180">
                  <template #default="{row}"><span style="font-weight:500;color:var(--neutral-800)">⏰ {{row.name}}</span></template>
                </el-table-column>
                <el-table-column prop="service" label="目标服务" width="180" />
                <el-table-column prop="trigger" label="触发方式" width="100">
                  <template #default="{row}"><el-tag :type="row.trigger==='Cron'?'':'info'" size="small">{{row.trigger}}</el-tag></template>
                </el-table-column>
                <el-table-column prop="time" label="执行时间" width="180">
                  <template #default="{row}"><code style="font-size:12px;background:var(--neutral-100);padding:2px 6px;border-radius:4px">{{row.time}}</code></template>
                </el-table-column>
                <el-table-column prop="branch" label="目标分支" width="120" />
                <el-table-column prop="rollback" label="失败回退" width="90" align="center">
                  <template #default="{row}">{{row.rollback?'✅':'❌'}}</template>
                </el-table-column>
                <el-table-column prop="dingtalk" label="钉钉通知" width="90" align="center">
                  <template #default="{row}">{{row.dingtalk?'✅':'❌'}}</template>
                </el-table-column>
                <el-table-column prop="lastExec" label="上次执行" width="170" />
                <el-table-column prop="status" label="状态" width="100">
                  <template #default="{row}">
                    <el-switch v-model="row.enabled" active-text="" inactive-text="" inline-prompt @change="toggleTask(row)" />
                  </template>
                </el-table-column>
                <el-table-column label="操作" width="200" fixed="right">
                  <template #default="{row}">
                    <el-button text type="success" size="small" @click="executeNow(row)">▶ 立即执行</el-button>
                    <el-button text type="primary" size="small" @click="editTask(row)">✏️ 编辑</el-button>
                    <el-popconfirm title="确认删除此定时任务？" @confirm="deleteTask(row)">
                      <template #reference><el-button text type="danger" size="small">🗑️</el-button></template>
                    </el-popconfirm>
                  </template>
                </el-table-column>
              </el-table>
              <div class="pagination-wrapper">
                <el-pagination background layout="total, sizes, prev, pager, next" :total="12" :page-size="10" />
              </div>
            </div>
          </template>

          <!-- 空数据 -->
          <div v-if="emptyData" class="card"><div class="empty-state"><div class="empty-icon">⏰</div><h4>暂无定时任务</h4><p>还没有创建任何定时部署任务，点击「创建定时任务」开始</p><el-button type="primary" @click="showAddDialog">➕ 创建定时任务</el-button></div></div>

          <!-- 错误 -->
          <div v-if="error" class="card"><el-alert title="加载定时任务列表失败" type="error" :closable="false" show-icon style="margin-bottom:16px"><template #default>任务调度器连接异常，请检查配置。</template></el-alert><el-button type="primary" @click="error=false;loading=true;setTimeout(()=>{loading=false},800)">🔄 重新加载</el-button></div>

          <!-- 创建/编辑定时任务对话框 -->
          <el-dialog v-model="dialogVisible" :title="isEdit?'编辑定时任务':'创建定时任务'" width="560px" destroy-on-close>
            <el-form :model="form" label-width="120px" label-position="right">
              <el-form-item label="任务名称" required><el-input v-model="form.name" placeholder="如：每日凌晨发布到测试环境" /></el-form-item>
              <el-form-item label="目标服务" required>
                <el-select v-model="form.service" placeholder="选择服务" style="width:100%">
                  <el-option label="order-service-prod" value="order-service-prod" />
                  <el-option label="order-service-test" value="order-service-test" />
                  <el-option label="user-service-prod" value="user-service-prod" />
                </el-select>
              </el-form-item>
              <el-form-item label="目标分支" required>
                <el-select v-model="form.branch" placeholder="选择分支" style="width:100%">
                  <el-option label="main" value="main" /><el-option label="develop" value="develop" /><el-option label="release/v1.2.0" value="release/v1.2.0" />
                </el-select>
              </el-form-item>
              <el-form-item label="触发方式" required>
                <el-radio-group v-model="form.triggerType">
                  <el-radio-button label="once">单次</el-radio-button>
                  <el-radio-button label="cron">Cron</el-radio-button>
                </el-radio-group>
              </el-form-item>
              <el-form-item label="执行时间" required v-if="form.triggerType==='once'">
                <el-date-picker v-model="form.execTime" type="datetime" placeholder="选择日期时间" style="width:100%" />
              </el-form-item>
              <el-form-item label="Cron 表达式" required v-else>
                <el-input v-model="form.cron" placeholder="如：0 2 * * *（每天凌晨2点）" />
                <div class="next-exec" v-if="form.cron">下次执行时间: <strong>2026-04-13 02:00:00</strong></div>
              </el-form-item>

              <el-divider content-position="left" style="margin:16px 0">高级选项</el-divider>

              <el-form-item label="失败回退策略">
                <el-select v-model="form.rollback" style="width:100%">
                  <el-option label="不回退" :value="0" />
                  <el-option label="自动回退到上一版本" :value="1" />
                  <el-option label="健康检查失败自动回退" :value="2" />
                </el-select>
              </el-form-item>
              <el-form-item label="钉钉通知">
                <el-switch v-model="form.dingtalk" active-text="开启" inactive-text="关闭" />
              </el-form-item>
              <el-form-item label="通知场景" v-if="form.dingtalk">
                <el-checkbox-group v-model="form.notifyScenes">
                  <el-checkbox label="success">发版成功</el-checkbox>
                  <el-checkbox label="failure">发版失败</el-checkbox>
                </el-checkbox-group>
              </el-form-item>
              <el-form-item label="@通知人" v-if="form.dingtalk">
                <el-input v-model="form.atUsers" placeholder="钉钉用户手机号，逗号分隔（可选）" />
              </el-form-item>
            </el-form>
            <template #footer>
              <el-button @click="dialogVisible=false">取消</el-button>
              <el-button type="primary" @click="submitForm">确定</el-button>
            </template>
          </el-dialog>
        </main>
      </div>
    </div>
  </div>

  <script>
    const{createApp,ref,reactive}=Vue;
    const app=createApp({setup(){
      const sidebarCollapsed=ref(false),loading=ref(false),error=ref(false),emptyData=ref(false);
      const dialogVisible=ref(false),isEdit=ref(false);
      const form=reactive({name:'',service:'',branch:'',triggerType:'cron',execTime:null,cron:'0 2 * * *',rollback:1,dingtalk:true,notifyScenes:['success','failure'],atUsers:''});
      const taskData=ref([
        {name:'每日凌晨发布到测试环境',service:'order-service-test',trigger:'Cron',time:'0 2 * * *',branch:'develop',rollback:true,dingtalk:true,lastExec:'2026-04-12 02:00 (成功)',enabled:true},
        {name:'周末定时发布预发',service:'order-service-staging',trigger:'Cron',time:'0 10 * * 6',branch:'release/v1.2.0',rollback:true,dingtalk:true,lastExec:'2026-04-12 10:00 (成功)',enabled:true},
        {name:'一次性发布到生产',service:'user-service-prod',trigger:'单次',time:'2026-04-15 03:00',branch:'main',rollback:true,dingtalk:true,lastExec:'—',enabled:false},
        {name:'每日构建 develop',service:'notify-service-dev',trigger:'Cron',time:'0 23 * * *',branch:'develop',rollback:false,dingtalk:false,lastExec:'2026-04-11 23:00 (失败)',enabled:true},
      ]);
      function showAddDialog(){isEdit.value=false;Object.assign(form,{name:'',service:'',branch:'',triggerType:'cron',execTime:null,cron:'0 2 * * *',rollback:1,dingtalk:true,notifyScenes:['success','failure'],atUsers:''});dialogVisible.value=true;}
      function editTask(row){isEdit.value=true;dialogVisible.value=true;}
      function deleteTask(row){ElementPlus.ElMessage.success('删除成功');}
      function executeNow(row){ElementPlus.ElMessageBox.confirm(`确认立即执行任务「${row.name}」？`,'立即执行',{type:'warning'}).then(()=>{ElementPlus.ElMessage.success('任务已加入执行队列');}).catch(()=>{});}
      function toggleTask(row){ElementPlus.ElMessage.success(row.enabled?'任务已启用':'任务已暂停');}
      function submitForm(){dialogVisible.value=false;ElementPlus.ElMessage.success(isEdit.value?'保存成功':'创建成功');}
      return{sidebarCollapsed,loading,error,emptyData,dialogVisible,isEdit,form,taskData,showAddDialog,editTask,deleteTask,executeNow,toggleTask,submitForm};
    }});
    app.use(ElementPlus);app.mount('#app');
  </script>
</body>
</html>
