<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpsPilot - 操作日志</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css">
  <script src="https://cdn.jsdelivr.net/npm/vue@3.5/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus"></script>
  <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue"></script>
  <style>
    :root{--brand-50:#EEF2FF;--brand-500:#6366F1;--brand-600:#4F46E5;--success-50:#ECFDF5;--success-500:#10B981;--warning-50:#FFFBEB;--warning-500:#F59E0B;--error-50:#FEF2F2;--error-500:#EF4444;--info-50:#EFF6FF;--info-500:#3B82F6;--neutral-50:#F9FAFB;--neutral-100:#F3F4F6;--neutral-200:#E5E7EB;--neutral-300:#D1D5DB;--neutral-400:#9CA3AF;--neutral-500:#6B7280;--neutral-600:#4B5563;--neutral-700:#374151;--neutral-800:#1F2937;--neutral-900:#111827;--env-dev:#3B82F6;--env-test:#F59E0B;--env-staging:#8B5CF6;--env-prod:#EF4444;--sidebar-bg:#1E1E2D;--sidebar-hover:#2A2A3C;--sidebar-active:#6366F1;--sidebar-text:#A2A3B7;--sidebar-text-active:#FFFFFF;--radius-sm:4px;--radius-md:8px;--shadow-sm:0 1px 2px rgba(0,0,0,0.05)}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Inter,'Helvetica Neue',Arial,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--neutral-50);color:var(--neutral-700);font-size:14px}
    .layout{display:flex;min-height:100vh}
    .sidebar{width:240px;background:var(--sidebar-bg);color:var(--sidebar-text);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow:hidden}
    .sidebar.collapsed{width:64px}
    .sidebar-logo{height:56px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid rgba(255,255,255,.08)}
    .sidebar-logo .logo-icon{font-size:24px;margin-right:12px}.sidebar-logo .logo-text{font-size:18px;font-weight:700;color:#fff;white-space:nowrap}
    .sidebar-menu{flex:1;padding:12px 8px;overflow-y:auto}
    .menu-item{display:flex;align-items:center;padding:10px 16px;border-radius:8px;margin-bottom:4px;cursor:pointer;transition:all .15s;color:var(--sidebar-text);text-decoration:none}
    .menu-item:hover{background:var(--sidebar-hover);color:var(--sidebar-text-active)}
    .menu-item.active{background:var(--sidebar-active);color:#fff;font-weight:500}
    .menu-item .icon{width:20px;margin-right:12px;font-size:16px;flex-shrink:0;text-align:center}
    .sidebar.collapsed .label,.sidebar.collapsed .logo-text{display:none}
    .sidebar.collapsed .menu-item{justify-content:center;padding:10px}.sidebar.collapsed .menu-item .icon{margin-right:0}
    .main-content{flex:1;margin-left:240px;display:flex;flex-direction:column;transition:margin-left .3s}
    .sidebar.collapsed~.main-content{margin-left:64px}
    .topbar{height:56px;background:#fff;border-bottom:1px solid var(--neutral-200);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
    .topbar-left{display:flex;align-items:center;gap:16px}
    .collapse-btn{cursor:pointer;font-size:20px;color:var(--neutral-500)}
    .breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--neutral-500)}
    .breadcrumb .current{color:var(--neutral-800);font-weight:500}
    .avatar{width:32px;height:32px;border-radius:50%;background:var(--brand-500);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;cursor:pointer}
    .page-content{flex:1;padding:24px;max-width:1400px;width:100%}
    .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .page-header h1{font-size:20px;font-weight:600;color:var(--neutral-900)}
    .page-header p{font-size:13px;color:var(--neutral-500);margin-top:4px}
    .filter-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:flex-end}
    .filter-bar .el-input{width:160px}
    .filter-bar .el-select{width:140px}
    .card{background:#fff;border-radius:8px;border:1px solid var(--neutral-200);box-shadow:var(--shadow-sm)}
    .card-header{padding:16px 24px;border-bottom:1px solid var(--neutral-200);display:flex;justify-content:space-between;align-items:center}
    .card-header h3{font-size:16px;font-weight:600;color:var(--neutral-800)}
    .card-body{padding:24px}
    .pagination-wrapper{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-top:1px solid var(--neutral-200)}
    .pagination-wrapper .export-btn{font-size:13px;color:var(--neutral-500)}
    .empty-state{text-align:center;padding:60px 20px}
    .empty-state .empty-icon{font-size:64px;margin-bottom:16px}
    .empty-state h4{font-size:16px;color:var(--neutral-700);margin-bottom:8px}
    .empty-state p{font-size:13px;color:var(--neutral-500);margin-bottom:24px}
    .op-type-icon{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;font-size:12px;margin-right:6px}
    @media(max-width:1440px){.page-content{max-width:1200px}}
    @media(max-width:768px){.sidebar{width:64px}.sidebar .label,.sidebar .logo-text{display:none}.sidebar .menu-item{justify-content:center;padding:10px}.sidebar .menu-item .icon{margin-right:0}.main-content{margin-left:64px!important}.page-content{padding:16px}.filter-bar{flex-direction:column}.filter-bar .el-input,.filter-bar .el-select{width:100%}.page-header{flex-direction:column;gap:12px;align-items:flex-start}}
  </style>
</head>
<body>
  <div id="app">
    <div class="layout">
      <aside class="sidebar" :class="{collapsed:sidebarCollapsed}">
        <div class="sidebar-logo"><span class="logo-icon">🚀</span><span class="logo-text">OpsPilot</span></div>
        <nav class="sidebar-menu">
          <a class="menu-item" href="dashboard.html"><span class="icon">🏠</span><span class="label">仪表盘</span></a>
          <a class="menu-item" href="project-manage.html"><span class="icon">📁</span><span class="label">项目管理</span></a>
          <a class="menu-item" href="server-manage.html"><span class="icon">🖥️</span><span class="label">服务器管理</span></a>
          <a class="menu-item" href="git-credential.html"><span class="icon">🔑</span><span class="label">Git 认证</span></a>
          <a class="menu-item" href="service-instance.html"><span class="icon">🔧</span><span class="label">服务管理</span></a>
          <a class="menu-item active" href="#"><span class="icon">📜</span><span class="label">操作日志</span></a>
          <a class="menu-item" href="schedule-task.html"><span class="icon">⏰</span><span class="label">定时任务</span></a>
          <a class="menu-item" href="#"><span class="icon">⚙️</span><span class="label">系统设置</span></a>
        </nav>
      </aside>
      <div class="main-content">
        <header class="topbar">
          <div class="topbar-left">
            <span class="collapse-btn" @click="sidebarCollapsed=!sidebarCollapsed">{{sidebarCollapsed?'☰':'✕'}}</span>
            <div class="breadcrumb"><span>首页</span><span>/</span><span class="current">操作日志</span></div>
          </div>
          <div class="topbar-right"><el-badge :value="3" :max="99"><span style="cursor:pointer;font-size:18px;color:var(--neutral-500)">🔔</span></el-badge><div class="avatar">管</div></div>
        </header>
        <main class="page-content" v-loading="loading">
          <template v-if="!error && !emptyData">
            <div class="page-header">
              <div><h1>操作日志</h1><p>记录所有关键操作的审计日志，用于问题追溯和责任认定。日志不可删除。</p></div>
            </div>

            <!-- 多条件筛选 -->
            <div class="filter-bar">
              <el-input v-model="fOperator" placeholder="操作人" clearable />
              <el-select v-model="fType" placeholder="操作类型" clearable>
                <el-option label="服务发版" value="deploy" /><el-option label="服务重启" value="restart" />
                <el-option label="版本回退" value="rollback" /><el-option label="服务创建" value="create_service" />
                <el-option label="服务删除" value="delete_service" /><el-option label="服务器添加" value="add_server" />
                <el-option label="配置修改" value="config_change" />
              </el-select>
              <el-select v-model="fEnv" placeholder="环境" clearable>
                <el-option label="开发" value="dev" /><el-option label="测试" value="test" />
                <el-option label="预发" value="staging" /><el-option label="生产" value="prod" />
              </el-select>
              <el-select v-model="fResult" placeholder="操作结果" clearable>
                <el-option label="成功" value="success" /><el-option label="失败" value="failed" />
                <el-option label="部分成功" value="partial" />
              </el-select>
              <el-date-picker v-model="fDateRange" type="daterange" range-separator="至" start-placeholder="开始日期" end-placeholder="结束日期" size="default" style="width:260px" />
              <el-input v-model="fTarget" placeholder="操作对象" clearable style="width:160px" />
              <el-button type="primary" @click="handleFilter">🔍 搜索</el-button>
              <el-button @click="resetFilter">重置</el-button>
            </div>

            <!-- 日志表格 -->
            <div class="card">
              <el-table :data="logData" stripe border style="width:100%">
                <el-table-column prop="id" label="ID" width="70" align="center" />
                <el-table-column prop="operator" label="操作人" width="90" />
                <el-table-column prop="type" label="操作类型" width="120">
                  <template #default="{row}">
                    <span class="op-type-icon" :style="{background:typeBg(row.type)}">{{typeIcon(row.type)}}</span>
                    <span style="font-size:13px">{{typeName(row.type)}}</span>
                  </template>
                </el-table-column>
                <el-table-column prop="target" label="操作对象" min-width="160" show-overflow-tooltip />
                <el-table-column prop="env" label="环境" width="80">
                  <template #default="{row}"><el-tag :type="row.env==='prod'?'danger':row.env==='staging'?'':row.env==='test'?'warning':''" size="small">{{row.env}}</el-tag></template>
                </el-table-column>
                <el-table-column prop="result" label="结果" width="90">
                  <template #default="{row}"><el-tag :type="row.result==='success'?'success':row.result==='failed'?'danger':'warning'" size="small">{{row.result==='success'?'成功':row.result==='failed'?'失败':'部分成功'}}</el-tag></template>
                </el-table-column>
                <el-table-column prop="duration" label="耗时" width="80" align="center" />
                <el-table-column prop="ip" label="IP 地址" width="130" />
                <el-table-column prop="time" label="操作时间" width="170" />
                <el-table-column label="操作" width="80" fixed="right">
                  <template #default="{row}"><el-button text type="primary" size="small" @click="showDetail(row)">详情</el-button></template>
                </el-table-column>
              </el-table>
              <div class="pagination-wrapper">
                <span class="export-btn">共 <strong>256</strong> 条记录</span>
                <div style="display:flex;align-items:center;gap:12px">
                  <el-button size="small" @click="exportLogs">📥 导出 CSV</el-button>
                  <el-pagination background layout="total, sizes, prev, pager, next, jumper" :total="256" :page-size="20" :page-sizes="[10,20,50,100]" />
                </div>
              </div>
            </div>
          </template>

          <!-- 空数据 -->
          <div v-if="emptyData" class="card"><div class="empty-state"><div class="empty-icon">📜</div><h4>暂无操作日志</h4><p>系统中还没有任何操作记录</p></div></div>

          <!-- 错误 -->
          <div v-if="error" class="card"><el-alert title="加载操作日志失败" type="error" :closable="false" show-icon style="margin-bottom:16px"><template #default>数据库查询超时，请稍后重试。</template></el-alert><el-button type="primary" @click="error=false;loading=true;setTimeout(()=>{loading=false},800)">🔄 重新加载</el-button></div>

          <!-- 日志详情对话框 -->
          <el-dialog v-model="detailVisible" title="操作日志详情" width="560px">
            <el-descriptions :column="1" border>
              <el-descriptions-item label="操作 ID">10042</el-descriptions-item>
              <el-descriptions-item label="操作人">小李</el-descriptions-item>
              <el-descriptions-item label="操作类型"><span class="op-type-icon" style="background:var(--success-50)">🚀</span>服务发版</el-descriptions-item>
              <el-descriptions-item label="操作对象">order-service-prod</el-descriptions-item>
              <el-descriptions-item label="环境"><el-tag size="small" type="danger">prod</el-tag></el-descriptions-item>
              <el-descriptions-item label="操作详情">发版部署：分支 main，目标版本 20260412_003_v1.0.2</el-descriptions-item>
              <el-descriptions-item label="操作结果"><el-tag size="small" type="success">成功</el-tag></el-descriptions-item>
              <el-descriptions-item label="耗时">3m 25s</el-descriptions-item>
              <el-descriptions-item label="IP 地址">192.168.1.50</el-descriptions-item>
              <el-descriptions-item label="操作时间">2026-04-12 10:00:00</el-descriptions-item>
            </el-descriptions>
            <template #footer><el-button @click="detailVisible=false">关闭</el-button></template>
          </el-dialog>
        </main>
      </div>
    </div>
  </div>

  <script>
    const{createApp,ref,reactive}=Vue;
    const app=createApp({setup(){
      const sidebarCollapsed=ref(false),loading=ref(false),error=ref(false),emptyData=ref(false);
      const fOperator=ref(''),fType=ref(''),fEnv=ref(''),fResult=ref(''),fDateRange=ref(null),fTarget=ref('');
      const detailVisible=ref(false);
      const logData=ref([
        {id:10042,operator:'小李',type:'deploy',target:'order-service-prod',env:'prod',result:'success',duration:'3m25s',ip:'192.168.1.50',time:'2026-04-12 10:00'},
        {id:10041,operator:'小王',type:'deploy',target:'report-service-staging',env:'staging',result:'failed',duration:'1m10s',ip:'192.168.1.51',time:'2026-04-12 09:35',error:'mvn build failed'},
        {id:10040,operator:'管理员',type:'restart',target:'user-service-prod',env:'prod',result:'success',duration:'12s',ip:'192.168.1.1',time:'2026-04-12 09:00'},
        {id:10039,operator:'小李',type:'rollback',target:'gateway-prod',env:'prod',result:'success',duration:'15s',ip:'192.168.1.50',time:'2026-04-12 08:00'},
        {id:10038,operator:'小张',type:'deploy',target:'notify-service-dev',env:'dev',result:'success',duration:'2m10s',ip:'192.168.1.52',time:'2026-04-12 07:00'},
        {id:10037,operator:'管理员',type:'add_server',target:'prod-order-03',env:'prod',result:'success',duration:'30s',ip:'192.168.1.1',time:'2026-04-11 18:00'},
        {id:10036,operator:'小李',type:'config_change',target:'order-service-prod',env:'prod',result:'success',duration:'2s',ip:'192.168.1.50',time:'2026-04-11 17:00'},
        {id:10035,operator:'管理员',type:'create_service',target:'payment-service-test',env:'test',result:'success',duration:'45s',ip:'192.168.1.1',time:'2026-04-11 16:00'},
      ]);
      function typeIcon(t){return{deploy:'🚀',restart:'🔄',rollback:'⏪',create_service:'➕',delete_service:'🗑️',add_server:'🖥️',config_change:'⚙️'}[t]||'📝'}
      function typeBg(t){return{deploy:'var(--success-50)',restart:'var(--brand-50)',rollback:'var(--warning-50)',create_service:'var(--info-50)',delete_service:'var(--error-50)',add_server:'var(--neutral-100)',config_change:'var(--neutral-100)'}[t]||'var(--neutral-100)'}
      function typeName(t){return{deploy:'服务发版',restart:'服务重启',rollback:'版本回退',create_service:'服务创建',delete_service:'服务删除',add_server:'服务器添加',config_change:'配置修改'}[t]||t}
      function handleFilter(){}
      function resetFilter(){fOperator.value='';fType.value='';fEnv.value='';fResult.value='';fDateRange.value=null;fTarget.value='';}
      function showDetail(row){detailVisible.value=true;}
      function exportLogs(){ElementPlus.ElMessage.success('导出功能：生成 CSV 文件下载');}
      return{sidebarCollapsed,loading,error,emptyData,fOperator,fType,fEnv,fResult,fDateRange,fTarget,detailVisible,logData,typeIcon,typeBg,typeName,handleFilter,resetFilter,showDetail,exportLogs};
    }});
    app.use(ElementPlus);app.mount('#app');
  </script>
</body>
</html>
