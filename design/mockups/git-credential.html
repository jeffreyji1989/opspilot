<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpsPilot - Git 认证管理</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css">
  <script src="https://cdn.jsdelivr.net/npm/vue@3.5/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus"></script>
  <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue"></script>
  <style>
    :root{--brand-50:#EEF2FF;--brand-500:#6366F1;--brand-600:#4F46E5;--success-50:#ECFDF5;--success-500:#10B981;--warning-50:#FFFBEB;--warning-500:#F59E0B;--error-50:#FEF2F2;--error-500:#EF4444;--info-50:#EFF6FF;--info-500:#3B82F6;--neutral-50:#F9FAFB;--neutral-100:#F3F4F6;--neutral-200:#E5E7EB;--neutral-300:#D1D5DB;--neutral-400:#9CA3AF;--neutral-500:#6B7280;--neutral-600:#4B5563;--neutral-700:#374151;--neutral-800:#1F2937;--neutral-900:#111827;--sidebar-bg:#1E1E2D;--sidebar-hover:#2A2A3C;--sidebar-active:#6366F1;--sidebar-text:#A2A3B7;--sidebar-text-active:#FFFFFF;--radius-sm:4px;--radius-md:8px;--shadow-sm:0 1px 2px rgba(0,0,0,0.05)}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Inter,'Helvetica Neue',Arial,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--neutral-50);color:var(--neutral-700);font-size:14px}
    .layout{display:flex;min-height:100vh}
    .sidebar{width:240px;background:var(--sidebar-bg);color:var(--sidebar-text);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow:hidden}
    .sidebar.collapsed{width:64px}
    .sidebar-logo{height:56px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid rgba(255,255,255,.08)}
    .sidebar-logo .logo-icon{font-size:24px;margin-right:12px}.sidebar-logo .logo-text{font-size:18px;font-weight:700;color:#fff;white-space:nowrap}
    .sidebar-menu{flex:1;padding:12px 8px;overflow-y:auto}
    .menu-item{display:flex;align-items:center;padding:10px 16px;border-radius:8px;margin-bottom:4px;cursor:pointer;transition:all .15s;color:var(--sidebar-text);text-decoration:none}
    .menu-item:hover{background:var(--sidebar-hover);color:var(--sidebar-text-active)}
    .menu-item.active{background:var(--sidebar-active);color:#fff;font-weight:500}
    .menu-item .icon{width:20px;margin-right:12px;font-size:16px;flex-shrink:0;text-align:center}
    .sidebar.collapsed .label,.sidebar.collapsed .logo-text{display:none}
    .sidebar.collapsed .menu-item{justify-content:center;padding:10px}.sidebar.collapsed .menu-item .icon{margin-right:0}
    .main-content{flex:1;margin-left:240px;display:flex;flex-direction:column;transition:margin-left .3s}
    .sidebar.collapsed~.main-content{margin-left:64px}
    .topbar{height:56px;background:#fff;border-bottom:1px solid var(--neutral-200);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
    .topbar-left{display:flex;align-items:center;gap:16px}
    .collapse-btn{cursor:pointer;font-size:20px;color:var(--neutral-500)}
    .breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--neutral-500)}
    .breadcrumb .current{color:var(--neutral-800);font-weight:500}
    .avatar{width:32px;height:32px;border-radius:50%;background:var(--brand-500);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;cursor:pointer}
    .page-content{flex:1;padding:24px;max-width:1400px;width:100%}
    .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .page-header h1{font-size:20px;font-weight:600;color:var(--neutral-900)}
    .page-header p{font-size:13px;color:var(--neutral-500);margin-top:4px}
    .card{background:#fff;border-radius:8px;border:1px solid var(--neutral-200);box-shadow:var(--shadow-sm)}
    .card-header{padding:16px 24px;border-bottom:1px solid var(--neutral-200);display:flex;justify-content:space-between;align-items:center}
    .card-header h3{font-size:16px;font-weight:600;color:var(--neutral-800)}
    .card-body{padding:24px}
    .pagination-wrapper{display:flex;justify-content:flex-end;padding:16px 24px;border-top:1px solid var(--neutral-200)}
    .empty-state{text-align:center;padding:60px 20px}
    .empty-state .empty-icon{font-size:64px;margin-bottom:16px}
    .empty-state h4{font-size:16px;color:var(--neutral-700);margin-bottom:8px}
    .empty-state p{font-size:13px;color:var(--neutral-500);margin-bottom:24px}
    .security-notice{background:var(--warning-50);border:1px solid var(--warning-500);border-radius:8px;padding:12px 16px;font-size:13px;color:#92400E;display:flex;align-items:center;gap:8px;margin-bottom:16px}
    .masked{font-family:monospace;color:var(--neutral-400)}
    @media(max-width:1440px){.page-content{max-width:1200px}}
    @media(max-width:768px){.sidebar{width:64px}.sidebar .label,.sidebar .logo-text{display:none}.sidebar .menu-item{justify-content:center;padding:10px}.sidebar .menu-item .icon{margin-right:0}.main-content{margin-left:64px!important}.page-content{padding:16px}.page-header{flex-direction:column;gap:12px;align-items:flex-start}}
  </style>
</head>
<body>
  <div id="app">
    <div class="layout">
      <aside class="sidebar" :class="{collapsed:sidebarCollapsed}">
        <div class="sidebar-logo"><span class="logo-icon">🚀</span><span class="logo-text">OpsPilot</span></div>
        <nav class="sidebar-menu">
          <a class="menu-item" href="dashboard.html"><span class="icon">🏠</span><span class="label">仪表盘</span></a>
          <a class="menu-item" href="project-manage.html"><span class="icon">📁</span><span class="label">项目管理</span></a>
          <a class="menu-item" href="server-manage.html"><span class="icon">🖥️</span><span class="label">服务器管理</span></a>
          <a class="menu-item active" href="#"><span class="icon">🔑</span><span class="label">Git 认证</span></a>
          <a class="menu-item" href="service-instance.html"><span class="icon">🔧</span><span class="label">服务管理</span></a>
          <a class="menu-item" href="operation-log.html"><span class="icon">📜</span><span class="label">操作日志</span></a>
          <a class="menu-item" href="schedule-task.html"><span class="icon">⏰</span><span class="label">定时任务</span></a>
          <a class="menu-item" href="#"><span class="icon">⚙️</span><span class="label">系统设置</span></a>
        </nav>
      </aside>
      <div class="main-content">
        <header class="topbar">
          <div class="topbar-left">
            <span class="collapse-btn" @click="sidebarCollapsed=!sidebarCollapsed">{{sidebarCollapsed?'☰':'✕'}}</span>
            <div class="breadcrumb"><span>首页</span><span>/</span><span class="current">Git 认证管理</span></div>
          </div>
          <div class="topbar-right"><el-badge :value="3" :max="99"><span style="cursor:pointer;font-size:18px;color:var(--neutral-500)">🔔</span></el-badge><div class="avatar">管</div></div>
        </header>
        <main class="page-content" v-loading="loading">
          <template v-if="!error && !emptyData">
            <div class="page-header">
              <div><h1>Git 认证管理</h1><p>统一管理所有 Git 仓库的认证信息（SSH Key / HTTPS Token），创建模块时直接关联。</p></div>
              <el-button type="primary" @click="showAddDialog">➕ 添加认证</el-button>
            </div>

            <div class="security-notice">
              <span style="font-size:18px">🔒</span>
              <div><strong>安全提示：</strong>私钥内容和 Token 值在数据库中 AES-256 加密存储，列表页不展示敏感信息。</div>
            </div>

            <div class="card">
              <el-table :data="credData" stripe border style="width:100%">
                <el-table-column prop="name" label="认证名称" min-width="200">
                  <template #default="{row}"><span style="font-weight:500;color:var(--neutral-800)">🔑 {{row.name}}</span></template>
                </el-table-column>
                <el-table-column prop="type" label="认证类型" width="140">
                  <template #default="{row}">
                    <el-tag :type="row.type==='SSH Key'?'':'warning'" size="small">{{row.type}}</el-tag>
                  </template>
                </el-table-column>
                <el-table-column prop="domain" label="适用域名" width="160" />
                <el-table-column prop="fingerprint" label="指纹/状态" width="200">
                  <template #default="{row}"><span class="masked">{{row.fingerprint}}</span></template>
                </el-table-column>
                <el-table-column prop="moduleCount" label="关联模块数" width="110" align="center" />
                <el-table-column prop="createTime" label="创建时间" width="170" />
                <el-table-column label="操作" width="160" fixed="right">
                  <template #default="{row}">
                    <el-button text type="primary" size="small" @click="editCred(row)">✏️ 编辑</el-button>
                    <el-button text type="danger" size="small" :disabled="row.moduleCount>0" @click="deleteCred(row)">🗑️ 删除</el-button>
                  </template>
                </el-table-column>
              </el-table>
              <div class="pagination-wrapper">
                <el-pagination background layout="total, prev, pager, next" :total="5" :page-size="10" />
              </div>
            </div>
          </template>

          <!-- 空数据 -->
          <div v-if="emptyData" class="card"><div class="empty-state"><div class="empty-icon">🔑</div><h4>暂无 Git 认证</h4><p>还没有添加任何 Git 认证信息，点击「添加认证」开始</p><el-button type="primary" @click="showAddDialog">➕ 添加认证</el-button></div></div>

          <!-- 错误 -->
          <div v-if="error" class="card"><el-alert title="加载认证列表失败" type="error" :closable="false" show-icon style="margin-bottom:16px"><template #default>数据库连接异常，请检查配置。</template></el-alert><el-button type="primary" @click="error=false;loading=true;setTimeout(()=>{loading=false},800)">🔄 重新加载</el-button></div>

          <!-- 添加/编辑认证对话框 -->
          <el-dialog v-model="dialogVisible" :title="isEdit?'编辑认证':'添加 Git 认证'" width="560px" destroy-on-close>
            <el-form :model="form" label-width="120px" label-position="right">
              <el-form-item label="认证名称" required><el-input v-model="form.name" placeholder="如：github-personal-key" /></el-form-item>
              <el-form-item label="认证类型" required>
                <el-radio-group v-model="form.type">
                  <el-radio-button label="SSH_KEY">SSH Key</el-radio-button>
                  <el-radio-button label="HTTPS_TOKEN">HTTPS Token</el-radio-button>
                </el-radio-group>
              </el-form-item>

              <!-- SSH Key 表单 -->
              <template v-if="form.type==='SSH_KEY'">
                <el-form-item label="私钥内容" required>
                  <el-input v-model="form.privateKey" type="textarea" :rows="6" placeholder="粘贴 RSA/ED25519 私钥内容" />
                </el-form-item>
                <el-form-item label="私钥密码">
                  <el-input v-model="form.passphrase" type="password" placeholder="私钥有密码保护时填写" show-password />
                </el-form-item>
              </template>

              <!-- HTTPS Token 表单 -->
              <template v-if="form.type==='HTTPS_TOKEN'">
                <el-form-item label="Token 值" required>
                  <el-input v-model="form.token" type="password" placeholder="粘贴 Personal Access Token" show-password />
                </el-form-item>
                <el-form-item label="适用域名">
                  <el-input v-model="form.domain" placeholder="如：github.com（可选）" />
                </el-form-item>
              </template>
            </el-form>
            <template #footer>
              <el-button @click="dialogVisible=false">取消</el-button>
              <el-button type="primary" @click="submitForm">确定</el-button>
            </template>
          </el-dialog>
        </main>
      </div>
    </div>
  </div>

  <script>
    const{createApp,ref,reactive}=Vue;
    const app=createApp({setup(){
      const sidebarCollapsed=ref(false),loading=ref(false),error=ref(false),emptyData=ref(false);
      const dialogVisible=ref(false),isEdit=ref(false);
      const form=reactive({name:'',type:'SSH_KEY',privateKey:'',passphrase:'',token:'',domain:''});
      const credData=ref([
        {name:'github-personal-key',type:'SSH Key',domain:'github.com',fingerprint:'SHA256:abc***xyz',moduleCount:3,createTime:'2026-03-10 09:00'},
        {name:'github-pat-readonly',type:'HTTPS Token',domain:'github.com',fingerprint:'ghp_***abc',moduleCount:1,createTime:'2026-03-15 14:30'},
        {name:'gitlab-deploy-key',type:'SSH Key',domain:'gitlab.example.com',fingerprint:'SHA256:def***uvw',moduleCount:2,createTime:'2026-04-01 11:00'},
        {name:'gitee-personal',type:'SSH Key',domain:'gitee.com',fingerprint:'SHA256:ghi***rst',moduleCount:0,createTime:'2026-04-05 16:20'},
      ]);
      function showAddDialog(){isEdit.value=false;Object.assign(form,{name:'',type:'SSH_KEY',privateKey:'',passphrase:'',token:'',domain:''});dialogVisible.value=true;}
      function editCred(row){isEdit.value=true;dialogVisible.value=true;}
      function deleteCred(row){ElementPlus.ElMessageBox.confirm(`确认删除认证「${row.name}」？`,'删除确认',{type:'warning'}).then(()=>{ElementPlus.ElMessage.success('删除成功');}).catch(()=>{});}
      function submitForm(){dialogVisible.value=false;ElementPlus.ElMessage.success(isEdit.value?'保存成功':'添加成功');}
      return{sidebarCollapsed,loading,error,emptyData,dialogVisible,isEdit,form,credData,showAddDialog,editCred,deleteCred,submitForm};
    }});
    app.use(ElementPlus);app.mount('#app');
  </script>
</body>
</html>
