<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpsPilot - 登录</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css">
  <script src="https://cdn.jsdelivr.net/npm/vue@3.5/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus"></script>
  <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --brand-500: #6366F1;
      --brand-600: #4F46E5;
      --brand-700: #4338CA;
      --neutral-50: #F9FAFB;
      --neutral-100: #F3F4F6;
      --neutral-200: #E5E7EB;
      --neutral-400: #9CA3AF;
      --neutral-500: #6B7280;
      --neutral-600: #4B5563;
      --neutral-700: #374151;
      --neutral-800: #1F2937;
      --neutral-900: #111827;
      --error-500: #EF4444;
      --error-600: #DC2626;
      --success-500: #10B981;
    }
    body {
      font-family: Inter, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-container {
      display: flex;
      width: 900px;
      max-width: 100%;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.25);
      min-height: 520px;
    }
    .login-banner {
      flex: 1;
      background: linear-gradient(135deg, #4338CA 0%, #6366F1 50%, #818CF8 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .login-banner::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      animation: pulse-bg 8s ease-in-out infinite;
    }
    @keyframes pulse-bg {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }
    .login-banner .logo-icon {
      font-size: 64px;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }
    .login-banner h1 {
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }
    .login-banner p {
      font-size: 16px;
      opacity: 0.85;
      text-align: center;
      line-height: 1.6;
      position: relative;
      z-index: 1;
      max-width: 320px;
    }
    .login-banner .features {
      margin-top: 32px;
      position: relative;
      z-index: 1;
    }
    .login-banner .features .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      margin-bottom: 12px;
      opacity: 0.9;
    }
    .login-banner .features .feature-item .icon {
      width: 24px;
      height: 24px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
    .login-form-wrapper {
      flex: 1;
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .login-form-wrapper h2 {
      font-size: 24px;
      font-weight: 600;
      color: var(--neutral-900);
      margin-bottom: 8px;
    }
    .login-form-wrapper .subtitle {
      font-size: 14px;
      color: var(--neutral-500);
      margin-bottom: 32px;
    }
    .login-form .el-form-item {
      margin-bottom: 20px;
    }
    .login-form .el-input__wrapper {
      border-radius: 8px;
      height: 44px;
    }
    .login-form .el-input__inner {
      font-size: 14px;
    }
    .login-btn {
      width: 100%;
      height: 44px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      background: var(--brand-500);
      border: none;
    }
    .login-btn:hover {
      background: var(--brand-600);
    }
    .login-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: var(--neutral-400);
    }
    .remember-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .remember-row a {
      color: var(--brand-500);
      text-decoration: none;
      font-size: 13px;
    }
    .remember-row a:hover {
      text-decoration: underline;
    }

    /* 768px 平板响应式 */
    @media (max-width: 768px) {
      .login-container {
        flex-direction: column;
        max-width: 420px;
        min-height: auto;
      }
      .login-banner {
        padding: 32px 24px;
        min-height: 200px;
      }
      .login-banner .features { display: none; }
      .login-banner h1 { font-size: 24px; }
      .login-banner .logo-icon { font-size: 48px; }
      .login-form-wrapper {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="login-container">
      <!-- 左侧 Banner -->
      <div class="login-banner">
        <div class="logo-icon">🚀</div>
        <h1>OpsPilot</h1>
        <p>轻量级运维管理系统<br>让发版部署像点几下鼠标一样简单</p>
        <div class="features">
          <div class="feature-item"><span class="icon">⚡</span> 一键发版，告别 SSH 手动操作</div>
          <div class="feature-item"><span class="icon">🔒</span> 生产环境二次确认，安全有保障</div>
          <div class="feature-item"><span class="icon">📊</span> 实时日志推送，问题快速定位</div>
          <div class="feature-item"><span class="icon">⏪</span> 一键回退，5 秒恢复稳定版本</div>
        </div>
      </div>

      <!-- 右侧登录表单 -->
      <div class="login-form-wrapper">
        <h2>欢迎回来</h2>
        <p class="subtitle">请登录你的 OpsPilot 账号</p>

        <el-form class="login-form" :model="form" :rules="rules" ref="formRef" @submit.prevent="handleLogin">
          <el-form-item prop="username">
            <el-input v-model="form.username" placeholder="用户名" :prefix-icon="User" size="large" />
          </el-form-item>
          <el-form-item prop="password">
            <el-input v-model="form.password" placeholder="密码" type="password" :prefix-icon="Lock" size="large" show-password @keyup.enter="handleLogin" />
          </el-form-item>
          <div class="remember-row">
            <el-checkbox v-model="form.remember">记住我</el-checkbox>
            <a href="#">忘记密码？</a>
          </div>
          <el-form-item>
            <el-button class="login-btn" type="primary" @click="handleLogin" :loading="loading" size="large">
              {{ loading ? '登录中...' : '登 录' }}
            </el-button>
          </el-form-item>
        </el-form>

        <div class="login-footer">
          © 2026 OpsPilot. All rights reserved.
        </div>
      </div>
    </div>

    <!-- 错误状态演示 -->
    <!-- 当登录失败时: -->
    <!-- <el-alert title="用户名或密码错误，请重试" type="error" :closable="false" show-icon style="position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;" /> -->

    <!-- Loading 状态: 按钮显示 :loading="true" 禁用态 -->
    <!-- 空状态: 不适用 -->
  </div>

  <script>
    const { createApp, ref, reactive } = Vue;
    const { User, Lock } = ElementPlusIconsVue;

    const app = createApp({
      setup() {
        const formRef = ref(null);
        const loading = ref(false);
        const form = reactive({
          username: '',
          password: '',
          remember: false
        });
        const rules = {
          username: [{ required: true, message: '请输入用户名', trigger: 'blur' }],
          password: [{ required: true, message: '请输入密码', trigger: 'blur' }]
        };

        function handleLogin() {
          formRef.value?.validate((valid) => {
            if (valid) {
              loading.value = true;
              // 模拟登录请求
              setTimeout(() => {
                loading.value = false;
                // 模拟失败
                // ElementPlus.ElMessage.error('用户名或密码错误，请重试');
                ElementPlus.ElMessage.success('登录成功，正在跳转...');
              }, 1500);
            }
          });
        }

        return { form, rules, formRef, loading, handleLogin, User, Lock };
      }
    });
    app.use(ElementPlus);
    for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
      app.component(key, component);
    }
    app.mount('#app');
  </script>
</body>
</html>
