<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpsPilot - 项目管理</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css">
  <script src="https://cdn.jsdelivr.net/npm/vue@3.5/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus"></script>
  <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue"></script>
  <style>
    :root{--brand-50:#EEF2FF;--brand-100:#E0E7FF;--brand-500:#6366F1;--brand-600:#4F46E5;--brand-700:#4338CA;--success-50:#ECFDF5;--success-500:#10B981;--warning-50:#FFFBEB;--warning-500:#F59E0B;--error-50:#FEF2F2;--error-500:#EF4444;--info-50:#EFF6FF;--info-500:#3B82F6;--neutral-50:#F9FAFB;--neutral-100:#F3F4F6;--neutral-200:#E5E7EB;--neutral-300:#D1D5DB;--neutral-400:#9CA3AF;--neutral-500:#6B7280;--neutral-600:#4B5563;--neutral-700:#374151;--neutral-800:#1F2937;--neutral-900:#111827;--env-dev:#3B82F6;--env-test:#F59E0B;--env-staging:#8B5CF6;--env-prod:#EF4444;--sidebar-bg:#1E1E2D;--sidebar-hover:#2A2A3C;--sidebar-active:#6366F1;--sidebar-text:#A2A3B7;--sidebar-text-active:#FFFFFF;--radius-sm:4px;--radius-md:8px;--radius-lg:12px;--shadow-sm:0 1px 2px rgba(0,0,0,0.05);--shadow-md:0 4px 6px -1px rgba(0,0,0,0.1)}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Inter,'Helvetica Neue',Arial,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--neutral-50);color:var(--neutral-700);font-size:14px}
    .layout{display:flex;min-height:100vh}
    .sidebar{width:240px;background:var(--sidebar-bg);color:var(--sidebar-text);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:width .3s;overflow:hidden}
    .sidebar.collapsed{width:64px}
    .sidebar-logo{height:56px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid rgba(255,255,255,.08)}
    .sidebar-logo .logo-icon{font-size:24px;margin-right:12px;flex-shrink:0}
    .sidebar-logo .logo-text{font-size:18px;font-weight:700;color:#fff;white-space:nowrap}
    .sidebar-menu{flex:1;padding:12px 8px;overflow-y:auto}
    .menu-item{display:flex;align-items:center;padding:10px 16px;border-radius:8px;margin-bottom:4px;cursor:pointer;transition:all .15s;color:var(--sidebar-text);text-decoration:none;font-size:14px}
    .menu-item:hover{background:var(--sidebar-hover);color:var(--sidebar-text-active)}
    .menu-item.active{background:var(--sidebar-active);color:#fff;font-weight:500}
    .menu-item .icon{width:20px;height:20px;margin-right:12px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .sidebar.collapsed .label,.sidebar.collapsed .logo-text{display:none}
    .sidebar.collapsed .menu-item{justify-content:center;padding:10px}
    .sidebar.collapsed .menu-item .icon{margin-right:0}
    .main-content{flex:1;margin-left:240px;display:flex;flex-direction:column;transition:margin-left .3s}
    .sidebar.collapsed~.main-content{margin-left:64px}
    .topbar{height:56px;background:#fff;border-bottom:1px solid var(--neutral-200);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
    .topbar-left{display:flex;align-items:center;gap:16px}
    .topbar-left .collapse-btn{cursor:pointer;font-size:20px;color:var(--neutral-500)}
    .topbar-left .breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--neutral-500)}
    .topbar-left .breadcrumb .current{color:var(--neutral-800);font-weight:500}
    .topbar-right{display:flex;align-items:center;gap:16px}
    .topbar-right .avatar{width:32px;height:32px;border-radius:50%;background:var(--brand-500);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;cursor:pointer}
    .page-content{flex:1;padding:24px;max-width:1400px;width:100%}
    .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .page-header h1{font-size:20px;font-weight:600;color:var(--neutral-900)}
    .page-header p{font-size:13px;color:var(--neutral-500);margin-top:4px}
    .search-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
    .search-bar .el-input{width:240px}
    .search-bar .el-select{width:160px}
    .card{background:#fff;border-radius:var(--radius-md);border:1px solid var(--neutral-200);box-shadow:var(--shadow-sm)}
    .card-header{padding:16px 24px;border-bottom:1px solid var(--neutral-200);display:flex;justify-content:space-between;align-items:center}
    .card-header h3{font-size:16px;font-weight:600;color:var(--neutral-800)}
    .card-body{padding:24px}
    .pagination-wrapper{display:flex;justify-content:flex-end;padding:16px 24px;border-top:1px solid var(--neutral-200)}
    .empty-state{text-align:center;padding:60px 20px}
    .empty-state .empty-icon{font-size:64px;margin-bottom:16px}
    .empty-state h4{font-size:16px;color:var(--neutral-700);margin-bottom:8px}
    .empty-state p{font-size:13px;color:var(--neutral-500);margin-bottom:24px}
    .status-tag{font-weight:500}
    @media(max-width:1440px){.page-content{max-width:1200px}}
    @media(max-width:768px){.sidebar{width:64px}.sidebar .label,.sidebar .logo-text{display:none}.sidebar .menu-item{justify-content:center;padding:10px}.sidebar .menu-item .icon{margin-right:0}.main-content{margin-left:64px!important}.page-content{padding:16px}.search-bar{flex-direction:column}.search-bar .el-input,.search-bar .el-select{width:100%}.page-header{flex-direction:column;gap:12px;align-items:flex-start}}
  </style>
</head>
<body>
  <div id="app">
    <div class="layout">
      <aside class="sidebar" :class="{collapsed:sidebarCollapsed}">
        <div class="sidebar-logo"><span class="logo-icon">🚀</span><span class="logo-text">OpsPilot</span></div>
        <nav class="sidebar-menu">
          <a class="menu-item" href="dashboard.html"><span class="icon">🏠</span><span class="label">仪表盘</span></a>
          <a class="menu-item active" href="#"><span class="icon">📁</span><span class="label">项目管理</span></a>
          <a class="menu-item" href="server-manage.html"><span class="icon">🖥️</span><span class="label">服务器管理</span></a>
          <a class="menu-item" href="git-credential.html"><span class="icon">🔑</span><span class="label">Git 认证</span></a>
          <a class="menu-item" href="service-instance.html"><span class="icon">🔧</span><span class="label">服务管理</span></a>
          <a class="menu-item" href="operation-log.html"><span class="icon">📜</span><span class="label">操作日志</span></a>
          <a class="menu-item" href="schedule-task.html"><span class="icon">⏰</span><span class="label">定时任务</span></a>
          <a class="menu-item" href="#"><span class="icon">⚙️</span><span class="label">系统设置</span></a>
        </nav>
      </aside>
      <div class="main-content">
        <header class="topbar">
          <div class="topbar-left">
            <span class="collapse-btn" @click="sidebarCollapsed=!sidebarCollapsed">{{sidebarCollapsed?'☰':'✕'}}</span>
            <div class="breadcrumb"><span>首页</span><span>/</span><span class="current">项目管理</span></div>
          </div>
          <div class="topbar-right"><el-badge :value="3" :max="99"><span style="cursor:pointer;font-size:18px;color:var(--neutral-500)">🔔</span></el-badge><div class="avatar">管</div></div>
        </header>
        <main class="page-content" v-loading="loading">
          <!-- 正常状态 -->
          <template v-if="!error && !emptyData">
            <div class="page-header">
              <div><h1>项目管理</h1><p>管理所有项目及其模块，模块是发版部署的基本单元。</p></div>
              <el-button type="primary" @click="showAddDialog">➕ 新建项目</el-button>
            </div>

            <!-- 搜索栏 -->
            <div class="search-bar">
              <el-input v-model="searchName" placeholder="搜索项目名称" clearable @clear="handleSearch" @keyup.enter="handleSearch">
                <template #prefix>🔍</template>
              </el-input>
              <el-input v-model="searchOwner" placeholder="负责人" clearable style="width:160px" @clear="handleSearch" @keyup.enter="handleSearch" />
              <el-select v-model="searchTag" placeholder="标签筛选" clearable @change="handleSearch">
                <el-option label="Java" value="Java" />
                <el-option label="Vue" value="Vue" />
                <el-option label="微服务" value="微服务" />
                <el-option label="电商" value="电商" />
              </el-select>
              <el-button type="primary" @click="handleSearch">搜索</el-button>
              <el-button @click="resetSearch">重置</el-button>
            </div>

            <!-- 数据表格 -->
            <div class="card">
              <el-table :data="tableData" stripe style="width:100%" border>
                <el-table-column prop="name" label="项目名称" min-width="180">
                  <template #default="{row}">
                    <span style="font-weight:500;color:var(--neutral-800)">{{row.name}}</span>
                  </template>
                </el-table-column>
                <el-table-column prop="owner" label="负责人" width="120" />
                <el-table-column prop="businessLine" label="所属业务" width="140" />
                <el-table-column prop="tags" label="标签" min-width="200">
                  <template #default="{row}">
                    <el-tag v-for="tag in row.tags" :key="tag" size="small" style="margin-right:4px;margin-bottom:2px">{{tag}}</el-tag>
                  </template>
                </el-table-column>
                <el-table-column prop="moduleCount" label="模块数" width="80" align="center" />
                <el-table-column prop="createTime" label="创建时间" width="170" />
                <el-table-column label="操作" width="220" fixed="right">
                  <template #default="{row}">
                    <el-button text type="primary" size="small" @click="editProject(row)">✏️ 编辑</el-button>
                    <el-button text type="primary" size="small" @click="manageModules(row)">📦 模块</el-button>
                    <el-button text type="danger" size="small" @click="deleteProject(row)" :disabled="row.moduleCount>0">🗑️ 删除</el-button>
                  </template>
                </el-table-column>
              </el-table>
              <div class="pagination-wrapper">
                <el-pagination background layout="total, sizes, prev, pager, next, jumper" :total="100" :page-size="10" :page-sizes="[10,20,50]" />
              </div>
            </div>
          </template>

          <!-- 空数据状态 -->
          <div v-if="emptyData" class="card">
            <div class="empty-state">
              <div class="empty-icon">📁</div>
              <h4>暂无项目</h4>
              <p>还没有创建任何项目，点击「新建项目」开始使用 OpsPilot</p>
              <el-button type="primary" @click="showAddDialog">➕ 新建项目</el-button>
            </div>
          </div>

          <!-- 错误状态 -->
          <div v-if="error" class="card" style="margin-bottom:16px">
            <el-alert title="加载项目列表失败" type="error" :closable="false" show-icon style="margin-bottom:16px">
              <template #default>网络连接超时，请检查网络后重试。</template>
            </el-alert>
            <el-button type="primary" @click="error=false;loading=true;setTimeout(()=>{loading=false},800)">🔄 重新加载</el-button>
          </div>

          <!-- 新建/编辑项目对话框 -->
          <el-dialog v-model="dialogVisible" :title="isEdit?'编辑项目':'新建项目'" width="560px" destroy-on-close>
            <el-form :model="form" label-width="100px" label-position="right">
              <el-form-item label="项目名称" required>
                <el-input v-model="form.name" placeholder="如：order-system" />
              </el-form-item>
              <el-form-item label="项目编码" required>
                <el-input v-model="form.code" placeholder="如：OPS-DEPLOY（唯一标识）" />
              </el-form-item>
              <el-form-item label="负责人" required>
                <el-select v-model="form.ownerId" placeholder="选择负责人" style="width:100%">
                  <el-option label="小李" :value="1" />
                  <el-option label="小王" :value="2" />
                  <el-option label="小张" :value="3" />
                </el-select>
              </el-form-item>
              <el-form-item label="所属业务线">
                <el-input v-model="form.businessLine" placeholder="如：交易中台" />
              </el-form-item>
              <el-form-item label="标签">
                <el-input v-model="form.tags" placeholder="逗号分隔，如：Java,SpringBoot,微服务" />
              </el-form-item>
              <el-form-item label="项目描述">
                <el-input v-model="form.description" type="textarea" :rows="3" placeholder="项目描述（可选）" />
              </el-form-item>
            </el-form>
            <template #footer>
              <el-button @click="dialogVisible=false">取消</el-button>
              <el-button type="primary" @click="submitForm">确定</el-button>
            </template>
          </el-dialog>

          <!-- 模块管理对话框 -->
          <el-dialog v-model="moduleDialogVisible" title="模块管理 — 订单系统" width="900px" destroy-on-close>
            <div style="margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:13px;color:var(--neutral-500)">模块是发版部署的基本单元，支持 JAR/WAR/Vue/React/Node.js 等类型。</span>
              <el-button type="primary" size="small" @click="showAddModule">➕ 添加模块</el-button>
            </div>
            <el-table :data="moduleData" stripe border style="width:100%">
              <el-table-column prop="name" label="模块名称" min-width="150" />
              <el-table-column prop="type" label="类型" width="120">
                <template #default="{row}">
                  <el-tag size="small" :type="row.type==='JAR'?'':row.type==='Vue'?'success':'warning'">{{row.type}}</el-tag>
                </template>
              </el-table-column>
              <el-table-column prop="gitUrl" label="Git 仓库" min-width="200" show-overflow-tooltip />
              <el-table-column prop="branch" label="默认分支" width="100" />
              <el-table-column prop="buildCmd" label="构建命令" min-width="200" show-overflow-tooltip />
              <el-table-column label="操作" width="120" fixed="right">
                <template #default>
                  <el-button text type="primary" size="small">✏️ 编辑</el-button>
                  <el-button text type="danger" size="small">🗑️</el-button>
                </template>
              </el-table-column>
            </el-table>
            <template #footer><el-button @click="moduleDialogVisible=false">关闭</el-button></template>
          </el-dialog>
        </main>
      </div>
    </div>
  </div>

  <script>
    const {createApp,ref,reactive} = Vue;
    const app = createApp({
      setup(){
        const sidebarCollapsed=ref(false),loading=ref(false),error=ref(false),emptyData=ref(false);
        const searchName=ref(''),searchOwner=ref(''),searchTag=ref('');
        const dialogVisible=ref(false),isEdit=ref(false),moduleDialogVisible=ref(false);
        const form=reactive({name:'',code:'',ownerId:null,businessLine:'',tags:'',description:''});
        const tableData=ref([
          {name:'order-system',code:'OPS-ORDER',owner:'小李',businessLine:'交易中台',tags:['Java','SpringBoot','微服务'],moduleCount:4,createTime:'2026-03-15 10:30'},
          {name:'user-center',code:'OPS-USER',owner:'小王',businessLine:'用户中心',tags:['Java','微服务'],moduleCount:3,createTime:'2026-03-18 14:20'},
          {name:'admin-frontend',code:'OPS-ADMIN',owner:'小张',businessLine:'管理平台',tags:['Vue','Element Plus'],moduleCount:1,createTime:'2026-03-20 09:15'},
          {name:'payment-gateway',code:'OPS-PAY',owner:'小李',businessLine:'支付中心',tags:['Java','SpringBoot'],moduleCount:2,createTime:'2026-04-01 11:00'},
          {name:'notify-service',code:'OPS-NOTIFY',owner:'小张',businessLine:'消息中心',tags:['Java','钉钉'],moduleCount:1,createTime:'2026-04-05 16:45'},
        ]);
        const moduleData=ref([
          {name:'order-service',type:'JAR',gitUrl:'git@github.com:xxx/order.git',branch:'main',buildCmd:'mvn clean package -pl order-service -am -DskipTests'},
          {name:'order-api',type:'JAR',gitUrl:'git@github.com:xxx/order.git',branch:'main',buildCmd:'mvn clean package -pl order-api -am -DskipTests'},
          {name:'order-admin',type:'Vue',gitUrl:'git@github.com:xxx/order-admin.git',branch:'main',buildCmd:'npm install && npm run build'},
          {name:'order-task',type:'JAR',gitUrl:'git@github.com:xxx/order.git',branch:'main',buildCmd:'mvn clean package -pl order-task -am -DskipTests'},
        ]);
        function handleSearch(){}
        function resetSearch(){searchName.value='';searchOwner.value='';searchTag.value='';}
        function showAddDialog(){isEdit.value=false;Object.assign(form,{name:'',code:'',ownerId:null,businessLine:'',tags:'',description:''});dialogVisible.value=true;}
        function editProject(row){isEdit.value=true;dialogVisible.value=true;}
        function deleteProject(row){ElementPlus.ElMessageBox.confirm(`确认删除项目「${row.name}」？此操作不可恢复。`,'删除确认',{type:'warning',confirmButtonText:'确认删除',cancelButtonText:'取消'}).then(()=>{ElementPlus.ElMessage.success('删除成功');}).catch(()=>{});}
        function manageModules(row){moduleDialogVisible.value=true;}
        function showAddModule(){ElementPlus.ElMessage.info('添加模块功能（同新建项目流程）');}
        function submitForm(){dialogVisible.value=false;ElementPlus.ElMessage.success(isEdit.value?'保存成功':'创建成功');}
        return{sidebarCollapsed,loading,error,emptyData,searchName,searchOwner,searchTag,dialogVisible,isEdit,moduleDialogVisible,form,tableData,moduleData,handleSearch,resetSearch,showAddDialog,editProject,deleteProject,manageModules,showAddModule,submitForm};
      }
    });
    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>
</html>
